appId: com.nsty.browser
productName: Nsty Browser
directories:
  output: release
  buildResources: resources

publish:
  - provider: github
    owner: muhammadnurhafiz-sys
    repo: nsty-browser

files:
  - dist/**/*
  - resources/**/*
  - "!node_modules/**/{test,tests,__tests__}/**"

asarUnpack:
  - "node_modules/better-sqlite3/**"

win:
  target: nsis
  icon: resources/icons/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icons/icon.png
  category: public.app-category.productivity

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target: AppImage
  icon: resources/icons/icon.png
  category: Network
